<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>String Heads Music</title>
  <link rel="icon" type="image/x-icon" href="/Logos/favicon.ico">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container glass-panel"
    style="background: transparent; box-shadow: none; border: none; padding-top: 1rem; padding-bottom: 1rem; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-radius: 0;">
    <nav class="animate-rhythm" style="animation-delay: 0.1s;">
      <a href="index.html" class="logo-lockup" style="text-decoration: none;">
        <img src="Logos/SHM.png" alt="String Heads Music Logo">
        <div class="logo-text">
          <span class="brand-name">STRING HEADS</span>
          <span class="brand-sub">MUSIC</span>
        </div>
      </a>

      <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </div>

  <main class="container hero-section">
    <div class="hero-content">
      <div class="hero-label label-md animate-rhythm" style="animation-delay: 0.2s;">
        Empowering the music of India
      </div>

      <h1 class="display-lg hero-title animate-rhythm" style="animation-delay: 0.3s;">
        STRING HEADS <br>
        <span class="text-gradient">MUSIC</span>
      </h1>

      <p class="body-lg hero-desc animate-rhythm" style="animation-delay: 0.4s;">
        The music entertainment hub that creates unique projects in the education and live music industry with a
        mission.
      </p>

      <div class="hero-actions animate-rhythm" style="animation-delay: 0.5s;">
        <a href="contact.html" class="btn btn-primary">Contact</a>
      </div>
    </div>

    <div class="grid-crop-wrapper animate-rhythm" style="animation-delay: 0.4s;">
      <div class="hero-grid">
        <!-- Row 1: Top edge (all empty) -->
        <div class="rotated-line">
          <div class="grid-item-invisible"></div>
          <div class="grid-item-invisible"></div>
          <div class="grid-item-invisible"></div>
          <div class="grid-item-visible"></div>
          <div class="grid-item-visible"></div>
        </div>

        <!-- Row 2: Puppet Music -->
        <div class="rotated-line">
          <div class="grid-item-invisible"></div>
          <div class="grid-item-invisible"></div>
          <div class="grid-item">
            <img src="Logos/PUPPET MUSIC.png" alt="Puppet Music">
          </div>
          <div class="grid-item">
            <img src="Logos/Live Metrix.png" alt="Live Metrix">
          </div>
          <div class="grid-item-visible"></div>
        </div>

        <!-- Row 3: GME, Tune Pad, Live Metrix -->
        <div class="rotated-line" style="z-index: 5;">
          <div class="grid-item-invisible"></div>
          <a href="https://generalmusiceducation.com" target="_blank">
            <div class="grid-item">
              <img src="Logos/GME.png" alt="GME">
            </div>
          </a>
          <div class="grid-item">
            <img src="Logos/Tune Pad.png" alt="Tune Pad">
          </div>
          <a href="https://gramophonelive.com" target="_blank">
            <div class="grid-item">
              <img src="Logos/GRAMOPHONE.png" alt="Gramophone Live">
            </div>
          </a>
          <div class="grid-item-visible"></div>
        </div>

        <!-- Row 4: Mad City, All Go Rhythm, Gramophone -->
        <div class="rotated-line">
          <div class="grid-item-invisible"></div>
          <div class="grid-item-invisible">
          </div>
          <div class="grid-item">
            <img src="Logos/Mad City Artist.png" alt="Mad City Artist">
          </div>
          <div class="grid-item">
            <img src="Logos/All Go Rhythm.png" alt="All Go Rhythm">
          </div>
          <div class="grid-item-visible"></div>
        </div>

        <!-- Row 5: Bottom edge (all empty) -->
        <div class="rotated-line">
          <div class="grid-item-invisible"></div>
          <div class="grid-item-invisible"></div>
          <div class="grid-item-invisible"></div>
          <div class="grid-item-visible"></div>
          <div class="grid-item-visible"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>

</html>
