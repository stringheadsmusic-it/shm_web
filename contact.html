<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | String Heads Music - Get in Touch</title>
  <meta name="description"
    content="Contact String Heads Music for business, investment, or partnership inquiries. We are empowering the music of India through education and live projects.">
  <link rel="canonical" href="https://stringheadsmusic.com/contact">
  <link rel="icon" type="image/x-icon" href="/Logos/favicon.ico">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://stringheadsmusic.com/contact">
  <meta property="og:title" content="Contact | String Heads Music - Get in Touch">
  <meta property="og:description"
    content="Contact us for business, investment, or partnership inquiries. Empowering the music of India.">
  <meta property="og:image" content="https://stringheadsmusic.com/Logos/SHM.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://stringheadsmusic.com/contact">
  <meta property="twitter:title" content="Contact | String Heads Music - Get in Touch">
  <meta property="twitter:description"
    content="Contact us for business, investment, or partnership inquiries. Empowering the music of India.">
  <meta property="twitter:image" content="https://stringheadsmusic.com/Logos/SHM.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <!-- Cloudflare Turnstile -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body style="overflow-y: scroll;">

  <div class="container glass-panel"
    style="background: transparent; box-shadow: none; border: none; padding-top: 1rem; padding-bottom: 1rem; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);  border-radius: 0;">
    <nav class="animate-rhythm" style="animation-delay: 0.1s;">
      <a href="./" class="logo-lockup" style="text-decoration: none;">
        <img src="Logos/SHM.png" alt="String Heads Music Logo">
        <div class="logo-text">
          <span class="brand-name">STRING HEADS</span>
          <span class="brand-sub">MUSIC</span>
        </div>
      </a>

      <div class="nav-links">
        <a href="./">Home</a>
        <a href="./contact" class="active">Contact</a>
      </div>
    </nav>
  </div>

  <main class="container contact-section">
    <div class="glass-panel form-container animate-rhythm"
      style="width: 100%; max-width: 600px; animation-delay: 0.2s;">
      <h1 class="display-lgc">Get in
        <span class="text-gradient">Touch</span>
      </h1>

      <form id="contactForm" class="contact-form"
        action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSeBu_xuD7c17pvXbPreAvWM3FQtXnBOFFi8sOLNW39twdZTvg/formResponse"
        method="POST" target="_self">


        <div
          style="opacity: 0; position: absolute; top: 0; left: 0; height: 0; width: 0; z-index: -1; overflow: hidden;">
          <label for="website_url">Website URL</label>
          <input type="text" id="website_url" name="website_url" tabindex="-1" autocomplete="off">
        </div>
        <div class="form-group animate-rhythm" style="animation-delay: 0.3s;">
          <label for="fullName" class="label-md">Full Name</label>
          <input type="text" id="fullName" name="entry.1364016515" required class="input-field">
        </div>

        <div class="form-group animate-rhythm" style="animation-delay: 0.4s;">
          <label for="phone" class="label-md">Phone Number</label>
          <input type="tel" id="phone" name="entry.1208534487" required class="input-field">
        </div>

        <div class="form-group animate-rhythm" style="animation-delay: 0.5s;">
          <label for="email" class="label-md">Email Address</label>
          <input type="email" id="email" name="entry.689249006" required class="input-field">
        </div>

        <div class="form-group animate-rhythm" style="animation-delay: 0.55s;">
          <label class="label-md">Inquiry</label>
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" name="entry.1742913900" value="Business">
              <span>Business</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="entry.1742913900" value="Investment">
              <span>Investment</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="entry.1742913900" value="Partnership">
              <span>Partnership</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="entry.1742913900" value="Others">
              <span>Others</span>
            </label>
          </div>
        </div>

        <div class="form-group animate-rhythm" style="animation-delay: 0.6s;">
          <label for="message" class="label-md">Message</label>
          <textarea id="message" name="entry.1573950496" rows="5" required class="input-field"
            style="resize: vertical;"></textarea>
        </div>

        <!-- Cloudflare Turnstile Widget -->
        <div id="turnstile-container" class="form-group animate-rhythm"
          style="animation-delay: 0.65s; margin-top: 0.5rem; transition: opacity 0.5s ease, height 0.5s ease; overflow: hidden;">
          <div class="cf-turnstile" data-sitekey="0x4AAAAAADAA-8gfyul5PMZF" data-theme="dark"
            data-callback="onTurnstileSuccess"></div>
        </div>

        <div class="form-actions animate-rhythm" style="animation-delay: 0.7s; margin-top: var(--spacing-4);">
          <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1rem;">Send Message</button>
        </div>
      </form>

      <!-- Success Message Holder -->
      <div id="formSuccess" class="animate-rhythm"
        style="display: none; text-align: center; margin-top: var(--spacing-4); padding: var(--spacing-4); background-color: var(--surface-container-high); border-radius: var(--radius-md); border: 1px solid var(--outline-variant); color: var(--primary);">
        <h3 class="label-md">Message Sent Successfully!</h3>
        <p class="body-lg" style="font-size: 0.875rem; margin-top: 0.5rem;">The team will get back to you shortly.</p>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>

</html>
